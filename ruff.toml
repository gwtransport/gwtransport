extend = "ruff_defaults.toml"

exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

target-version = "py311"

[format]
preview = true

[lint]
preview = true

extend-select = ["D"]

[lint.pydocstyle]
convention = "numpy"

[lint.per-file-ignores]
'**/*.py' = [
    "RUF001",
    "TC003",    # Type checking is fine.
]
"examples/**/*.py" = [
    "INP001",  # __init__.py is not needed for the examples folder
    "T201",  # Allow for print statements
    "DOC201",  # Small example helpers don't need Returns docs
]
"examples/**/*.ipynb" = [
    "INP001",  # __init__.py is not needed for the examples folder
    "T201",  # Allow for print statements
    "B018", # allow notebooks printing out variables in the mid cell with variable names only
    "PLR2004",
    "E402",
    "DOC201",  # Small notebook helpers don't need Returns docs
]
"tests/**/*.py" = [
    "DOC201",  # Test functions returning None don't need Returns docs
    "DOC501",  # Test functions don't need Raises docs
    "DOC502",  # Test helpers may document exceptions not directly raised
]
"src/gwtransport/deposition.py" = [
    "DOC502",  # Public entry points document ValueError; the raises happen inside _validate_deposition_inputs
]
"src/gwtransport/diffusion.py" = [
    "DOC502",  # Public entry points document ValueError; the raises happen inside _validate_diffusion_inputs
]
"src/gwtransport/advection.py" = [
    "DOC502",  # Public entry points document ValueError; the raises happen inside _validate_advection_inputs
]
"src/gwtransport/logremoval.py" = [
    "DOC502",  # time_until_log_removal_breach documents ValueError; raises happen in the _validation atoms / gamma_find_flow_for_target_mean
]
"src/gwtransport/fronttracking/*.py" = [
    # Physics module: docstrings intentionally use unicode symbols (θ, α, ρ, ×, ≤, ≥) for math notation.
    "RUF002",  # Ambiguous unicode in docstrings (greek letters / math symbols are intentional)
    "RUF003",  # Ambiguous unicode in comments (same rationale as RUF002)
    # Many internal functions have simple, type-hint-evident returns; Returns sections add noise.
    "DOC201",  # `return` not documented in docstring
    "DOC102",  # Documented parameter not in signature (small drift after refactor)
    "DOC501",  # Raised exception missing from docstring
]
"tests/**/test_*.py" = [
    "S101",    # asserts allowed in tests
    "D",
    "PT011",   # ValueError should be allowed
    "PLR2004",
    "PLR6301",  # Tests may be grouped in classes for clarity
    "INP001",  # __init__.py is not needed for the test folders
    "PLC2701",  # Private functions may also be tested
    "RUF002",  # Greek / math unicode in physics-module test docstrings (matches fronttracking source ignore)
    "RUF003",  # Same rationale in comments
]